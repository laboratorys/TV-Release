name: Build and Release APK
on:
  workflow_dispatch: # 手动触发
    inputs:
      build_tag:
        description: '指定构建的 Tag (例如 v5.2.4)，留空则使用 lab 分支'
        required: false
        default: ''
  schedule:
    - cron: '0 17,5 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      R2_BUCKET_NAME: "apk"
      ANDROID_BUILD_TOOLS: "34.0.0" # 指定构建工具版本
      GRADLE_OPTS: "-Dorg.gradle.caching=true -Dorg.gradle.parallel=true"
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      # 1. 拉取目标仓库代码
      - name: 🛒 Checkout TV project
        uses: actions/checkout@v5
        with:
          repository: laboratorys/TV-Release # 目标仓库
          ref: ${{ github.event.inputs.build_tag || 'lab' }} # 指定分支
          path: tv-app # 代码存放目录
          fetch-depth: 0
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
      - name: 📥 Download last_build_commit.txt from latest release
        run: |
          cd tv-app
          if curl -fsSL -o last_build_commit.txt "https://github.com/laboratorys/TV-Release/releases/latest/download/last_build_commit.txt"; then
            echo "📥 Retrieved previous build timestamp"
          else
            echo "⚠️ No previous build record found, initializing..."
            echo "0" > last_build_commit.txt
          fi
      # 2. 动态判断是否跳过构建检查
      - name: ⚙️ Build Control
        id: build-control
        run: |
          # 1. 手动触发逻辑：直接构建
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "🎯 手动触发 - 强制构建"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 2. 定时任务逻辑 (Schedule)
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            echo "⏰ 定时任务 - 检查更新..."
            cd tv-app
          
            # 获取当前代码中 JSON 的最新版本号 (例如: 5.2.4)
            # 优先检查 mobile，如果 mobile 没变再看 leanback
            CURRENT_VER=$(jq -r '.[0].name' update/mobile.json)
            echo "🔍 当前 JSON 版本号: $CURRENT_VER"
          
            # 检查这个版本号是否已经存在于 Git Tag 中
            # 我们加上 'v' 前缀来匹配你 Release 的格式 (v5.2.4)
            if git rev-parse "v$CURRENT_VER" >/dev/null 2>&1; then
              echo "✅ 版本 v$CURRENT_VER 已存在于 Release 中，无需重复构建。"
          
              # 虽然版本没变，但我们还是检查一下代码是否有极其重要的更新（可选）
              # 如果你坚持“版本号不改就不构建”，这里直接 exit
              echo "should_build=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          
            # 如果 Tag 不存在，再检查是否有新提交（防止在空仓库跑）
            LAST_COMMIT_DATE=$(git log -1 --format=%ct)
            PREV_COMMIT_DATE=$(cat last_build_commit.txt 2>/dev/null || echo 0)
          
            if [[ $LAST_COMMIT_DATE -le $PREV_COMMIT_DATE ]]; then
               echo "🕒 虽然是新版本名，但自上次检查后无新提交 - 跳过"
               echo "should_build=false" >> $GITHUB_OUTPUT
               exit 0
            fi
          
            echo "🚀 发现未发布的新版本: v$CURRENT_VER"
            echo "should_build=true" >> $GITHUB_OUTPUT
            # 更新时间戳供下次对比
            echo $LAST_COMMIT_DATE > last_build_commit.txt
          fi
      - name: 📌 Extract versionName
        if: steps.build-control.outputs.should_build == 'true'
        id: version
        working-directory: tv-app
        run: |
          # 使用 grep 提取 versionName
          VERSION=$(grep -oP 'versionName\s+"\K[0-9.]+(?=")' app/build.gradle)
          echo "Extracted versionName: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      # 3. 环境设置
      - name: ☕ Set up JDK 17
        if: steps.build-control.outputs.should_build == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 🤖 Setup Android SDK
        if: steps.build-control.outputs.should_build == 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;34.0.0'
      - name: 🔧 Configure Build Tools Path
        if: steps.build-control.outputs.should_build == 'true'
        run: |
          # 确保构建工具路径在PATH中
          echo "$ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}" >> $GITHUB_PATH
          echo "Build tools path configured"
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      # 4. 缓存 Gradle 依赖（加速构建）
      - name: 🏗️ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            tv-app/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('tv-app/gradle/wrapper/gradle-wrapper.properties', 'tv-app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Download AAR Files
        if: false
        working-directory: tv-app # 进入目标仓库目录
        run: |
          curl -sSLo download_aars.sh https://raw.githubusercontent.com/laboratorys/TV-Release/refs/heads/main/scripts/download_aars.sh
          chmod +x download_aars.sh
          ./download_aars.sh
      # 5. 构建 APK
      - name: 🔨 Build & Sign APK
        if: steps.build-control.outputs.should_build == 'true'
        working-directory: tv-app # 进入目标仓库目录
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }} # Base64 编码的签名文件
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          # 解码签名文件
          echo "🔑 Decoding keystore..."
          echo "$KEYSTORE" | base64 -d > keystore.jks
          
          # 赋予 gradlew 执行权限
          chmod +x gradlew
          
          # 执行 Gradle 签名构建
          echo "🚀 Building APK..."
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            --console=plain --no-daemon
          
          mkdir -p release_apks
          echo "🔍 Collecting signed APKs..."
          
          find app/build/outputs/apk -type f -name "*.apk" ! -name "*unsigned*" | while read -r apk; do
            # 提取文件名信息用于归档 (例如: leanback-arm64-v8a.apk)
            # 这里简单处理，你可以根据需要保留原始路径或重命名
            FILENAME=$(basename "$apk")
            echo "✅ Found Signed APK: $FILENAME"
            cp "$apk" "release_apks/$FILENAME"
          done
          rm -f keystore.jks
          
          # 6. 验证 (可选)
          if [ -z "$(ls -A release_apks/)" ]; then
            echo "❌ Error: No signed APK found! Check Gradle build logs."
            exit 1
          fi
          echo "📦 生成的 APK 文件列表："
          ls -lh release_apks/
      - name: 📝 Process Update JSON
        if: steps.build-control.outputs.should_build == 'true'
        run: |
          curl -sSLo process_json.sh https://raw.githubusercontent.com/laboratorys/TV-Release/refs/heads/main/scripts/process_json.sh
          chmod +x process_json.sh
          ./process_json.sh "${{ steps.version.outputs.version }}" "上游仓库同步更新"
      - name: Generate current time
        id: datetime
        run: echo "CURRENT_TIME=$(date -u +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      # 7. 创建 Release 并上传 APK
      - name: 🚀 Upload to Release
        if: steps.build-control.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}" # 使用 versionName 作为标签
          name: "📱 Release v${{ steps.version.outputs.version }}"
          body: |
            ✨ Multi-ABI APK Build
            - Version: ${{ steps.version.outputs.version }}
            - Build Date: ${{ steps.datetime.outputs.CURRENT_TIME }}
            - Variants: mobile, leanback
            - ABIs: armeabi_v7a, arm64_v8a
          files: |
            tv-app/release_apks/*.apk
            tv-app/last_build_commit.txt
            processed_json/leanback.json
            processed_json/mobile.json
          token: ${{ secrets.GITHUB_TOKEN }}
          # 8. 上传到 Cloudflare R2
      - name: ☁️ Sync to Cloudflare R2 (Keep Latest Only)
        if: steps.build-control.outputs.should_build == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          echo "🔄 同步文件到 R2..."
          # 使用 aws s3 sync 实现增量同步
          # --endpoint-url: R2 的连接地址
          # --delete: 关键参数！如果 R2 上有文件但在本地 release_apks 中不存在，则删除 R2 上的文件
          # 这样可以确保 R2 桶里永远只有本次构建生成的最新 APK
          echo "📂 Preparing JSON files for sync..."
          cp processed_json/leanback.json tv-app/release_apks/
          cp processed_json/mobile.json tv-app/release_apks/
          aws s3 sync tv-app/release_apks/ s3://${{ env.R2_BUCKET_NAME }}/tv/ \
          --endpoint-url ${{ secrets.R2_BUCKET_URL }}
      - name: 🧹 Purge Cloudflare CDN Cache
        # 只有当你配置了 CF_API_TOKEN 时才运行，防止报错
        if: steps.build-control.outputs.should_build == 'true' && env.CF_API_TOKEN != ''
        run: |
          echo "🧼 正在刷新 Cloudflare 缓存..."
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'
